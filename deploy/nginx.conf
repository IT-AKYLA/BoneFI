server {
    listen 80;
    server_name localhost;

    # Фронтенд
    location / {
        root /usr/share/nginx/html;
        index BoneFI.html;
        try_files $uri $uri/ /BoneFI.html;
    }

    # Прокси для Analysis API
    location /api/ {
        proxy_pass http://data-analysis:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Прокси для Management API
    location /collect/ {
        proxy_pass http://data-management:8001/collect/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Health checks
    location /health {
        proxy_pass http://data-analysis:8000/health;
        proxy_set_header Host $host;
    }
}