server {
    listen 80;
    server_name your-domain.com;  # замени на свой домен

    location / {
        root /usr/share/nginx/html;
        index BoneFI.html;
        try_files $uri $uri/ /BoneFI.html;
    }

    location /api/ {
        proxy_pass http://data-analysis:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /collect/ {
        proxy_pass http://data-management:8001/collect/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}