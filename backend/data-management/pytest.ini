[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=src --cov-report=term
asyncio_mode = auto

markers =
    unit: Быстрые юнит-тесты
    redis: Тесты требующие Redis
    network: Тесты требующие сеть

norecursedirs = __pycache__ .pytest_cache