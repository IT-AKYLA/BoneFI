[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=src --cov-report=term
asyncio_mode = auto

markers =
    unit: Быстрые юнит-тесты
    slow: Медленные тесты (требуют реальных данных)
    api: Тесты API эндпоинтов

norecursedirs = __pycache__ .pytest_cache