name: BoneFi Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  

env:
  PYTHON_VERSION: '3.11'
  REDIS_VERSION: '7'

jobs:
  test-analysis:
    name: Test Data Analysis Service
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: data-analysis/requirements.txt
      
      - name: Install dependencies
        run: |
          cd data-analysis
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      
      - name: Run unit tests
        run: |
          cd data-analysis
          pytest tests/ -v -m "unit" --cov=src --cov-report=xml --cov-report=term
        continue-on-error: false
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./data-analysis/coverage.xml
          flags: analysis
          name: analysis-coverage
          fail_ci_if_error: false

  test-management:
    name: Test Data Management Service
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      redis:
        image: redis:${{ env.REDIS_VERSION }}-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: data-management/requirements.txt
      
      - name: Install dependencies
        run: |
          cd data-management
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      
      - name: Wait for Redis
        run: |
          for i in {1..10}; do
            if redis-cli -h localhost -p 6379 ping; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis... ($i/10)"
            sleep 2
          done
          echo "Redis not ready"
          exit 1
      
      - name: Run unit tests
        run: |
          cd data-management
          pytest tests/ -v -m "unit" --cov=src --cov-report=xml --cov-report=term
        continue-on-error: false
      
      - name: Run Redis tests
        run: |
          cd data-management
          pytest tests/ -v -m "redis" --cov=src --cov-append --cov-report=xml
        continue-on-error: false
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./data-management/coverage.xml
          flags: management
          name: management-coverage
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-analysis, test-management]
    
    services:
      redis:
        image: redis:${{ env.REDIS_VERSION }}-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio aiohttp
      
      - name: Start Data Management API
        run: |
          cd data-management
          nohup python run_api.py > management.log 2>&1 &
          echo $! > management.pid
          sleep 5
      
      - name: Start Data Analysis API
        run: |
          cd data-analysis
          nohup python run_api.py > analysis.log 2>&1 &
          echo $! > analysis.pid
          sleep 5
      
      - name: Check services health
        run: |
          curl -f http://localhost:8001/health || exit 1
          curl -f http://localhost:8000/health || exit 1
      
      - name: Run integration tests
        run: |
          pytest tests/ -v -m "integration" --tb=short
        continue-on-error: false
      
      - name: Stop services
        if: always()
        run: |
          kill $(cat data-management/management.pid) 2>/dev/null || true
          kill $(cat data-analysis/analysis.pid) 2>/dev/null || true
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            data-management/management.log
            data-analysis/analysis.log

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    services:
      redis:
        image: redis:${{ env.REDIS_VERSION }}-alpine
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install all dependencies
        run: |
          pip install -r requirements.txt
          cd data-analysis && pip install -r requirements.txt
          cd ../data-management && pip install -r requirements.txt
          cd ..
          pip install pytest pytest-asyncio aiohttp
      
      - name: Start both services
        run: |
          cd data-management && python run_api.py &
          cd ../data-analysis && python run_api.py &
          sleep 10
      
      - name: Run E2E tests
        run: |
          pytest tests/ -v -m "e2e" --tb=short
        continue-on-error: false
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linters
        run: |
          pip install flake8 black mypy isort
      
      - name: Run isort (import sorting)
        run: |
          isort --check-only --diff data-analysis/src data-management/src
        continue-on-error: true
      
      - name: Run black (code formatting)
        run: |
          black --check --diff data-analysis/src data-management/src
        continue-on-error: true
      
      - name: Run flake8 (linting)
        run: |
          flake8 data-analysis/src --max-line-length=120 --ignore=E203,W503
          flake8 data-management/src --max-line-length=120 --ignore=E203,W503
        continue-on-error: true
      
      - name: Run mypy (type checking)
        run: |
          mypy data-analysis/src --ignore-missing-imports || true
          mypy data-management/src --ignore-missing-imports || true
        continue-on-error: true

  final-status:
    name: Final Status
    runs-on: ubuntu-latest
    needs: [test-analysis, test-management, integration, lint]
    if: always()
    
    steps:
      - name: Check results
        run: |
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Analysis | ${{ needs.test-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Management | ${{ needs.test-management.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.test-analysis.result }}" == "success" && \
                "${{ needs.test-management.result }}" == "success" && \
                "${{ needs.integration.result }}" == "success" ]]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ Some tests failed!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi